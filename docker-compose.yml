# Local development stack. Mirrors the AKS topology: a stateless api pod, a
# worker pod that does the heavy lifting, Redis as the broker, Postgres standing
# in for the Neon branch.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: videoservice
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: .
    ports: ["8000:8000"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/videoservice
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["./app:/app/app"]

  worker:
    build: .
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/videoservice
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    # Phase 3 wires the real task graph. Until then the worker has nothing to do.
    command: ["sh", "-c", "echo 'worker: no tasks until Phase 3' && sleep infinity"]
    volumes: ["./app:/app/app"]

volumes:
  pgdata:
